services:
  postgres:
    image: postgres:16-alpine
    container_name: evermemos_postgres
    environment:
      POSTGRES_USER: evermemos
      POSTGRES_PASSWORD: evermemos
      POSTGRES_DB: evermemos
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: evermemos_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: evermemos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
  qdrant_data:
